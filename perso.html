<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM_OVERRIDE</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #00ff41; 
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- Effet CRT --- */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 20;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Halo vert réduit pour ne pas déborder sur PC */
        .background-halo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 0; height: 0;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease, width 2.5s ease, height 2.5s ease;
        }

        .background-halo.visible {
            opacity: 1;
            width: 100vmax; /* Taille plus équilibrée */
            height: 100vmax;
        }

        /* --- Terminal --- */
        #terminal {
            align-self: flex-start;
            z-index: 5;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            transition: opacity 0.5s ease;
        }

        .line { margin-bottom: 4px; }
        .cursor {
            display: inline-block;
            width: 8px; height: 1.1em;
            background: #00ff41;
            margin-left: 4px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- Message Final (FORCÉ EN 2 LIGNES) --- */
        .final-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            display: none;
            text-align: center;
            width: 100%;
        }

        .final-message {
            display: flex;
            flex-direction: column; /* Force le retour à la ligne */
            align-items: center;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            /* Police s'adaptant parfaitement à l'écran */
            font-size: clamp(1.8rem, 10vw, 4rem);
            line-height: 1.1;
            letter-spacing: 0.2em;
            text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            animation: glitch 1s infinite, shake 0.3s infinite;
        }

        .final-message span {
            display: block; /* Force chaque bloc de texte sur sa ligne */
        }

        /* --- Animations --- */
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            50% { text-shadow: 0.035em 0.05em 0 #00fffc, 0.05em 0 0 #fc00ff, 0 -0.05em 0 #fffc00; }
            100% { text-shadow: -0.025em 0 0 #00fffc, -0.025em -0.025em 0 #fc00ff, -0.025em -0.05em 0 #fffc00; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div class="background-halo" id="halo"></div>
    <div id="terminal"></div>

    <div id="final-container" class="final-container">
        <div class="final-message">
            <span>YOU ARE GETTING</span>
            <span>XENOTED</span>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const finalContainer = document.getElementById('final-container');
        const halo = document.getElementById('halo');

        const logs = [
            "> INITIALIZING XENOTED OS...",
            "> LOADING VERCEL_BYPASS_MODULE...",
            "> ACCESS GRANTED.",
            "> CONNECTION TERMINATED."
        ];

        function typeText(text, element) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i); i++;
                        setTimeout(type, 15);
                    } else { resolve(); }
                }
                type();
            });
        }

        async function start() {
            for (const log of logs) {
                const line = document.createElement('div');
                line.className = 'line';
                terminal.appendChild(line);
                const cur = document.createElement('span');
                cur.className = 'cursor';
                line.appendChild(cur);
                const txt = document.createTextNode("");
                line.insertBefore(txt, cur);
                await typeText(log, txt);
                cur.remove();
                await new Promise(r => setTimeout(r, 100));
            }
            await new Promise(r => setTimeout(r, 600));
            terminal.style.opacity = '0';
            await new Promise(r => setTimeout(r, 400));
            halo.classList.add('visible');
            await new Promise(r => setTimeout(r, 1500));
            finalContainer.style.display = 'block';
        }
        window.onload = start;
    </script>
</body>
</html>
