<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM_OVERRIDE</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #00ff41; 
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- Effet CRT --- */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Halo vert optimisé */
        .background-halo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 0; height: 0;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease, width 2.5s ease, height 2.5s ease;
        }

        .background-halo.visible {
            opacity: 1;
            width: 150vmax;
            height: 150vmax;
        }

        /* --- Terminal --- */
        #terminal {
            align-self: flex-start;
            z-index: 5;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            transition: opacity 0.5s ease;
        }

        .line { margin-bottom: 4px; }
        .cursor {
            display: inline-block;
            width: 8px; height: 1.1em;
            background: #00ff41;
            margin-left: 4px;
            animation: blinkCursor 0.8s infinite;
        }
        @keyframes blinkCursor { 50% { opacity: 0; } }

        /* --- Message Final (STRUCTURE FIXE SUR 2 LIGNES) --- */
        .final-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            display: none; /* Caché par défaut */
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .final-message {
            display: flex;
            flex-direction: column; /* Force le retour à la ligne vertical */
            align-items: center;
            text-align: center;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            font-size: clamp(1.4rem, 8vw, 4rem); /* Police massive mais adaptative */
            line-height: 1.2;
            letter-spacing: 0.15em;
            text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            animation: glitchText 1s infinite, shakeContainer 0.3s infinite;
        }

        /* Force chaque segment sur sa propre ligne */
        .msg-top, .msg-bottom {
            display: block;
            width: 100%;
            white-space: nowrap; /* Empêche un mot de descendre tout seul */
        }

        /* --- Message d'alerte rouge clignotant --- */
        .alert-message {
            margin-top: 20px; /* Espace après le message principal */
            color: #ff0000; /* Rouge vif */
            font-size: clamp(0.9rem, 4vw, 1.5rem);
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.1em;
            text-transform: none; /* Garde la casse d'origine */
            animation: blinkAlert 0.6s step-end infinite; /* Clignotement rapide */
        }

        /* --- Animations --- */
        @keyframes glitchText {
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            33% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            66% { text-shadow: 0.035em 0.05em 0 #00fffc, 0.05em 0 0 #fc00ff, 0 -0.05em 0 #fffc00; }
            100% { text-shadow: -0.025em 0 0 #00fffc, -0.025em -0.025em 0 #fc00ff, -0.025em -0.05em 0 #fffc00; }
        }

        @keyframes shakeContainer {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes blinkAlert {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-halo" id="halo"></div>
    <div id="terminal"></div>

    <div id="final-container" class="final-container">
        <div class="final-message">
            <div class="msg-top">YOU ARE GETTING</div>
            <div class="msg-bottom">XENONED</div>
        </div>
        <div class="alert-message">Xenon owns your phone</div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const finalContainer = document.getElementById('final-container');
        const halo = document.getElementById('halo');

        const logs = [
            "> INITIALIZING XENONED OS...",
            "> LOADING VERCEL_BYPASS_MODULE...",
            "> INJECTING PAYLOAD... [OK]",
            "> BRUTEFORCING ROOT_PASS...",
            "> ACCESS GRANTED.",
            "> DOWNLOADING USER_DATA...",
            "> ENCRYPTING SYSTEM...",
            "> WIPING LOG FILES...",
            "> CONNECTION TERMINATED."
        ];

        function typeText(text, element) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i); i++;
                        setTimeout(type, 15);
                    } else { resolve(); }
                }
                type();
            });
        }

        async function start() {
            for (const log of logs) {
                const line = document.createElement('div');
                line.className = 'line';
                terminal.appendChild(line);
                const cur = document.createElement('span');
                cur.className = 'cursor';
                line.appendChild(cur);
                const txt = document.createTextNode("");
                line.insertBefore(txt, cur);
                await typeText(log, txt);
                cur.remove();
                await new Promise(r => setTimeout(r, 100));
            }
            await new Promise(r => setTimeout(r, 600));
            terminal.style.opacity = '0';
            await new Promise(r => setTimeout(r, 400));
            halo.classList.add('visible');
            await new Promise(r => setTimeout(r, 1500));
            finalContainer.style.display = 'flex'; // Utilise Flex pour tout centrer
        }
        window.onload = start;
    </script>
</body>
</html>
