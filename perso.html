<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_OVERRIDE</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #00ff41; 
            font-family: 'Courier New', monospace;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .terminal-text { padding: 30px; font-size: 1.1rem; line-height: 1.8; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #00ff41; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        @media screen and (max-width: 768px) {
            .terminal-text { font-size: 0.9rem; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="terminal-text">
        <p>> CONNECTION ESTABLISHED...</p>
        <p>> DECRYPTING RSA_KEYS... [SUCCESS]</p>
        <p>> ACCESSING SECURE_STORAGE...</p>
        <p>> WELCOME, ADMIN.<span class="cursor"></span></p>
    </div>
</body>
</html>
