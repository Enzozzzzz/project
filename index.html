<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - SYSTEM ACCESS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-wrapper" id="terminal-screen">
        <div class="terminal-loader">
            <div class="terminal-header">
                <div class="terminal-title">Status: Encrypting...</div>
                <div class="terminal-controls">
                    <div class="control close"></div>
                    <div class="control minimize"></div>
                    <div class="control maximize"></div>
                </div>
            </div>
            <div class="text">Loading...</div>
        </div>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content" id="main-ui">
        <button class="glitch-btn" id="access-button">
           INITIALIZE_HACK
        </button>
    </div>

    <script>
        const button = document.getElementById('access-button');
        const terminalScreen = document.getElementById('terminal-screen');
        const mainUi = document.getElementById('main-ui');

        // Fonction pour réinitialiser la page proprement
        function resetInterface() {
            mainUi.classList.remove('fade-out');
            terminalScreen.classList.remove('active', 'fade-out');
            console.log("Interface réinitialisée");
        }

        button.addEventListener('click', () => {
            // 1. On cache l'UI principale
            mainUi.classList.add('fade-out');
            
            // 2. On affiche le terminal après un court délai
            setTimeout(() => {
                terminalScreen.classList.add('active');
                
                // 3. Temps d'attente de 5 secondes
                setTimeout(() => {
                    // 4. On fait disparaître le terminal
                    terminalScreen.classList.add('fade-out');
                    
                    // 5. Redirection une fois le fondu terminé
                    setTimeout(() => {
                        window.location.href = "perso.html";
                    }, 800);
                }, 5000);
            }, 500); 
        });

        // --- FIX : RETOUR EN ARRIÈRE & SYNC ---
        window.addEventListener('pageshow', (event) => {
            // Force le reset si on revient en arrière ou si la page est chargée
            resetInterface();
        });
    </script>
</body>
</html>
