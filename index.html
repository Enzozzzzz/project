<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - SYSTEM ACCESS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-wrapper" id="terminal-screen">
        <div class="terminal-loader">
            <div class="terminal-header">
                <div class="terminal-title">Status: Encrypting...</div>
                <div class="terminal-controls">
                    <div class="control close"></div>
                    <div class="control minimize"></div>
                    <div class="control maximize"></div>
                </div>
            </div>
            <div class="text">Loading...</div>
        </div>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content" id="main-ui">
        <button class="glitch-btn" id="access-button">
           INITIALIZE_HACK
        </button>
    </div>

    <script>
        const button = document.getElementById('access-button');
        const terminalScreen = document.getElementById('terminal-screen');
        const mainUi = document.getElementById('main-ui');

        button.addEventListener('click', () => {
            // 1. Début du fondu de sortie de l'interface initiale
            mainUi.style.opacity = '0';
            
            // On attend 500ms (la durée du fondu CSS) pour afficher le terminal
            setTimeout(() => {
                terminalScreen.classList.add('active');
                
                // 2. Phase de chargement de 5 secondes
                setTimeout(() => {
                    // 3. Lancer le fondu de sortie du terminal
                    terminalScreen.style.opacity = '0';
                    
                    // 4. Redirection uniquement quand le fondu est physiquement terminé
                    // Cela évite les flashs blancs sur les connexions lentes
                    terminalScreen.addEventListener('transitionend', () => {
                        window.location.href = "perso.html";
                    }, { once: true });
                    
                }, 5000);
            }, 500); 
        });
    </script>
</body>
</html>
