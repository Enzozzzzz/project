<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - SYSTEM ACCESS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-wrapper" id="terminal-screen">
        <div class="terminal-loader">
            <div class="terminal-header">
                <div class="terminal-title">Status: Encrypting...</div>
                <div class="terminal-controls">
                    <div class="control close"></div>
                    <div class="control minimize"></div>
                    <div class="control maximize"></div>
                </div>
            </div>
            <div class="text">Loading...</div>
        </div>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content" id="main-ui">
        <button class="glitch-btn" id="access-button">
           INITIALIZE_HACK
        </button>
    </div>

    <script>
        const button = document.getElementById('access-button');
        const terminalScreen = document.getElementById('terminal-screen');
        const mainUi = document.getElementById('main-ui');

        button.addEventListener('click', () => {
            mainUi.style.opacity = '0';
            
            setTimeout(() => {
                terminalScreen.classList.add('active');
                
                setTimeout(() => {
                    terminalScreen.style.opacity = '0';
                    terminalScreen.addEventListener('transitionend', () => {
                        window.location.href = "perso.html";
                    }, { once: true });
                }, 5000);
            }, 500); 
        });

        // --- CORRECTION POUR LE RETOUR EN ARRIÈRE (BFCache) ---
        // Cet événement se déclenche à chaque fois que la page est affichée,
        // même lors d'un retour en arrière depuis le cache du navigateur.
        window.addEventListener('pageshow', (event) => {
            // Si la page vient d'être restaurée depuis le cache
            if (event.persisted) {
                // On réinitialise l'opacité du bouton
                mainUi.style.opacity = '1';
                // On cache le terminal s'il était resté visible
                terminalScreen.classList.remove('active');
                terminalScreen.style.opacity = '1'; // Reset l'opacité pour la prochaine fois
            }
        });
    </script>
</body>
</html>
